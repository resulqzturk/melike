<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Günün Kutlu Olsun Melike! 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #ffecd2 50%, #fcb69f 75%, #ff9a9e 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 50px;
            max-width: 700px;
            position: relative;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .flower {
            position: fixed;
            font-size: 4rem;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(255, 105, 180, 0.4));
            z-index: 0;
        }

        .flower:nth-child(1) { top: 8%; left: 3%; animation-delay: 0s; }
        .flower:nth-child(2) { top: 15%; right: 3%; animation-delay: 0.7s; }
        .flower:nth-child(3) { top: 65%; left: 5%; animation-delay: 1.4s; }
        .flower:nth-child(4) { top: 75%; right: 5%; animation-delay: 2.1s; }
        .flower:nth-child(5) { top: 35%; left: 2%; animation-delay: 2.8s; }
        .flower:nth-child(6) { top: 55%; right: 2%; animation-delay: 3.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ff1493;
            text-shadow: 0 4px 30px rgba(255, 20, 147, 0.5);
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .name {
            font-size: 6rem;
            font-weight: 800;
            margin: 35px 0;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 50%, #ff69b4 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 4s ease infinite;
            filter: drop-shadow(0 8px 25px rgba(255, 20, 147, 0.4));
            letter-spacing: -2px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .message {
            font-size: 1.4rem;
            color: #d63384;
            margin: 25px 0;
            line-height: 1.9;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            font-weight: 500;
        }

        .cake {
            font-size: 8rem;
            margin: 30px 0;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hearts {
            font-size: 2rem;
            margin: 20px 0;
        }

        .heart {
            display: inline-block;
            animation: heartBeat 1s ease-in-out infinite;
            margin: 0 10px;
        }

        .heart:nth-child(odd) { animation-delay: 0.2s; }
        .heart:nth-child(even) { animation-delay: 0.4s; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .wishes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .wish {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 18px 28px;
            border-radius: 20px;
            font-size: 1.1rem;
            color: #d63384;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wish:hover {
            transform: translateY(-8px) scale(1.08);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.3);
        }

        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff69b4;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .name { font-size: 3rem; }
            .message { font-size: 1.2rem; padding: 20px; }
            .cake { font-size: 5rem; }
            .flower { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="flower">🌸</div>
    <div class="flower">🌺</div>
    <div class="flower">🌷</div>
    <div class="flower">🌹</div>
    <div class="flower">💐</div>
    <div class="flower">🌼</div>

    <div class="container">
        <h1>🎉 Doğum Günün Kutlu Olsun! 🎉</h1>
        <div class="name">Melike</div>
        <div class="cake">🎂</div>
        <div class="message">
            Geçmiş Doğum Günün Kutlu Olsun Melike! 🌟<br>
            Senin gibi güzel bir insanın,<br>
            Her zaman mutlu ve sağlıklı olmasını diliyorum.<br>
            İyi Akşamlar! 💕
        </div>
        <div class="hearts">
            <span class="heart">💖</span>
            <span class="heart">💗</span>
            <span class="heart">💕</span>
            <span class="heart">💓</span>
            <span class="heart">💝</span>
        </div>
        <div class="wishes">
            <div class="wish">🌟 Mutluluk</div>
            <div class="wish">💖 Sağlık</div>
            <div class="wish">🎁 Başarı</div>
            <div class="wish">🌸 Güzellik</div>
            <div class="wish">✨ Sevgi</div>
        </div>
    </div>

    <script>
        // Create sparkles on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.background = ['#ff69b4', '#ff1493', '#ff6b9d', '#ff9a9e'][Math.floor(Math.random() * 4)];
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        // Create confetti periodically
        setInterval(() => {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.background = ['#ff69b4', '#ff1493', '#ff6b9d', '#ff9a9e', '#ffd700', '#ff69b4'][Math.floor(Math.random() * 6)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }, 300);

        // Create burst of confetti on click
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = e.clientX + 'px';
                confetti.style.top = e.clientY + 'px';
                confetti.style.background = ['#ff69b4', '#ff1493', '#ff6b9d', '#ff9a9e', '#ffd700'][Math.floor(Math.random() * 5)];
                confetti.style.animation = 'none';
                confetti.style.transition = 'all 1s ease-out';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    const angle = (i / 20) * 360;
                    const distance = 100 + Math.random() * 100;
                    const x = Math.cos(angle * Math.PI / 180) * distance;
                    const y = Math.sin(angle * Math.PI / 180) * distance;
                    confetti.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
                    confetti.style.opacity = '0';
                }, 10);
                
                setTimeout(() => confetti.remove(), 1000);
            }
        });
    </script>
</body>
</html>
